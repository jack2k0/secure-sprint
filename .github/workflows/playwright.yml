name: Playwright E2E

# Manual or explicit: needs demo + Supabase secrets; does not block default CI.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "src/**"
      - "package.json"
      - "package-lock.json"

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Run Playwright tests
        env:
          DEMO_EMAIL: ${{ secrets.E2E_EMAIL }}
          DEMO_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -z "$DEMO_EMAIL" ] || [ -z "$DEMO_PASSWORD" ] || [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Skipping E2E: set repository secrets E2E_EMAIL, E2E_PASSWORD, SUPABASE_URL, SUPABASE_KEY"
            exit 0
          fi
          npx playwright test --project=setup --project=chromium
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
